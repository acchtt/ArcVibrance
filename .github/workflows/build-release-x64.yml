name: Build Release x64

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "ArcVibrance.WinUI/**"
      - "NativeAgent/**"
      - "ArcVibrance.sln"
      - "build.ps1"
      - "RELEASE_NOTES_*.md"
      - ".github/workflows/build-release-x64.yml"
  pull_request:
    paths:
      - "ArcVibrance.WinUI/**"
      - "NativeAgent/**"
      - "ArcVibrance.sln"
      - "build.ps1"
      - "RELEASE_NOTES_*.md"
      - ".github/workflows/build-release-x64.yml"

permissions:
  contents: read

concurrency:
  group: build-release-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows Release x64
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      release_archive: ${{ steps.release.outputs.archive }}
      release_checksum: ${{ steps.release.outputs.checksum }}
      release_artifact: ${{ steps.release.outputs.artifact }}
      release_notes: ${{ steps.release.outputs.notes }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Show tool versions
        run: |
          dotnet --info
          cmake --version

      - name: Resolve release metadata
        id: release
        run: |
          [xml]$project = Get-Content "ArcVibrance.WinUI\ArcVibrance.WinUI.csproj"
          $versionGroup = @($project.Project.PropertyGroup) |
            Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_.InformationalVersion) } |
            Select-Object -First 1
          $tag = ([string]$versionGroup.InformationalVersion).Trim()

          if ($tag -notmatch '^v[0-9]+\.[0-9]+(?:\.[0-9]+){0,2}$') {
            throw "InformationalVersion must be a stable v-prefixed version, received: $tag"
          }

          $archive = "ArcVibrance-$tag-win-x64.zip"
          $checksum = "$archive.sha256"
          $artifact = "ArcVibrance-$tag-win-x64"
          $notes = "RELEASE_NOTES_$tag.md"

          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive=$archive" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "checksum=$checksum" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact=$artifact" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "notes=$notes" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build self-contained Release x64
        run: ./build.ps1 -Configuration Release -Platform x64 -SelfContained

      - name: Verify distribution
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist\x64"
          $requiredFiles = @(
            "ArcVibrance.exe",
            "ArcVibrance.Agent.exe"
          )

          foreach ($fileName in $requiredFiles) {
            $path = Join-Path $dist $fileName
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Required release file is missing: $path"
            }
            if ((Get-Item $path).Length -le 0) {
              throw "Required release file is empty: $path"
            }
          }

          $releaseFiles = @(Get-ChildItem $dist -File -Recurse)
          $debugFiles = @($releaseFiles | Where-Object { $_.Extension -eq ".pdb" })
          if ($debugFiles.Count -gt 0) {
            throw "Release package contains debug symbols: $($debugFiles.FullName -join ', ')"
          }

          if ($releaseFiles.Count -ne 2) {
            throw "Release package should contain exactly 2 files, found $($releaseFiles.Count): $($releaseFiles.FullName -join ', ')"
          }

          Write-Host "Verified compact distribution with $($releaseFiles.Count) files."

      - name: Package Windows artifact
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "dist\x64\*"
          $archive = Join-Path $env:GITHUB_WORKSPACE "${{ steps.release.outputs.archive }}"
          Compress-Archive -Path $source -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ steps.release.outputs.archive }}" |
            Set-Content "$archive.sha256" -Encoding ascii -NoNewline

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release.outputs.artifact }}
          path: |
            ${{ steps.release.outputs.archive }}
            ${{ steps.release.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish stable release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Release ArcVibrance ')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out release notes
        uses: actions/checkout@v7

      - name: Download validated Windows build
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.release_artifact }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_ARCHIVE: ${{ needs.build.outputs.release_archive }}
          RELEASE_CHECKSUM: ${{ needs.build.outputs.release_checksum }}
          RELEASE_NOTES: ${{ needs.build.outputs.release_notes }}
        run: |
          if [ ! -f "$RELEASE_NOTES" ]; then
            echo "Missing release notes: $RELEASE_NOTES" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --latest \
              --prerelease=false \
              --title "ArcVibrance $RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES" \
              --repo "$GITHUB_REPOSITORY"
            gh release upload "$RELEASE_TAG" "$RELEASE_ARCHIVE" "$RELEASE_CHECKSUM" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ARCHIVE" "$RELEASE_CHECKSUM" \
              --latest \
              --target "$GITHUB_SHA" \
              --title "ArcVibrance $RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES" \
              --repo "$GITHUB_REPOSITORY"
          fi

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
