name: Build Release x64

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ArcVibrance.WinUI/**"
      - "NativeAgent/**"
      - "ArcVibrance.sln"
      - "build.ps1"
      - ".github/workflows/build-release-x64.yml"
  pull_request:
    paths:
      - "ArcVibrance.WinUI/**"
      - "NativeAgent/**"
      - "ArcVibrance.sln"
      - "build.ps1"
      - ".github/workflows/build-release-x64.yml"

permissions:
  contents: read

concurrency:
  group: build-release-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows Release x64
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Show tool versions
        run: |
          dotnet --info
          cmake --version

      - name: Build self-contained Release x64
        run: ./build.ps1 -Configuration Release -Platform x64 -SelfContained

      - name: Verify distribution
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist\x64"
          $requiredFiles = @(
            "ArcVibrance.exe",
            "ArcVibrance.Agent.exe"
          )

          foreach ($fileName in $requiredFiles) {
            $path = Join-Path $dist $fileName
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Required release file is missing: $path"
            }
            if ((Get-Item $path).Length -le 0) {
              throw "Required release file is empty: $path"
            }
          }

      - name: Package Windows artifact
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "dist\x64\*"
          $archive = Join-Path $env:GITHUB_WORKSPACE "ArcVibrance-v1.0-win-x64.zip"
          Compress-Archive -Path $source -DestinationPath $archive -CompressionLevel Optimal

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ArcVibrance-v1.0-win-x64
          path: ArcVibrance-v1.0-win-x64.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish v1.0 release
    needs: build
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Release ArcVibrance ')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out release notes
        uses: actions/checkout@v7

      - name: Download validated Windows build
        uses: actions/download-artifact@v8
        with:
          name: ArcVibrance-v1.0-win-x64

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v1.0
          RELEASE_ARCHIVE: ArcVibrance-v1.0-win-x64.zip
          PREVIOUS_RELEASE_TAG: C1.18.1
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --latest \
              --prerelease=false \
              --title "ArcVibrance $RELEASE_TAG" \
              --notes-file RELEASE_NOTES_v1.0.md \
              --repo "$GITHUB_REPOSITORY"
            gh release upload "$RELEASE_TAG" "$RELEASE_ARCHIVE" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ARCHIVE" \
              --latest \
              --target "$GITHUB_SHA" \
              --title "ArcVibrance $RELEASE_TAG" \
              --notes-file RELEASE_NOTES_v1.0.md \
              --repo "$GITHUB_REPOSITORY"
          fi

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

          if [ "$PREVIOUS_RELEASE_TAG" != "$RELEASE_TAG" ] &&
             gh release view "$PREVIOUS_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$PREVIOUS_RELEASE_TAG" \
              --cleanup-tag \
              --yes \
              --repo "$GITHUB_REPOSITORY"
          fi
